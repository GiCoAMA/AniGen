services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./static/images:/app/static/images
      - ./data:/app/data
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    command: python -m arq app.worker.WorkerSettings
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./static/images:/app/static/images
      - ./data:/app/data
    depends_on:
      - redis
    restart: always
